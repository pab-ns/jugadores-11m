<!DOCTYPE html>
<html lang="en">

<head>

   <meta property="og:image" content="https://pab-ns.github.io/jugadores-11m/imgs/thumb-jugadores-11m.webp">
    <meta property="og:url" content="https://pab-ns.github.io/jugadores-11m/">
    <meta name="twitter:card" content="summary">

       <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://pab-ns.github.io/hello/img/favicon_io/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="https://pab-ns.github.io/hello/img/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://pab-ns.github.io/hello/img/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://pab-ns.github.io/hello/img/favicon_io/favicon-16x16.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&family=Tourney:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <!-- local storage light/dark mode -->
    <script>
        // It's best to inline this in `head` to avoid FOUC (flash of unstyled content) when changing pages or themes
        // https://www.freecodecamp.org/news/how-to-build-a-dark-mode-switcher-with-tailwind-css-and-flowbite/
        if (
          localStorage.getItem('color-theme') === 'dark' ||
          (!('color-theme' in localStorage) &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="script.js" defer></script>      
      
    <title>Los Jugadores – El Once de Manolo</title>
</head>
<body class="dark:bg-gradient-to-r dark:from-gray-800 dark:via-gray-900 dark:to-black font-spartan bg-gradient-to-r from-white to-zinc-100 dark:text-white text--gray-800">

  <!-- HEADER -->
   <header class="sticky top-0 z-50 font-medium uppercase">
    <div class="container max-w-screen-xl mx-auto flex py-4 justify-between px-8">
      <!-- 11 logo -->
      <button class="text-gray-500 dark:text-gray-400 hover:bg-gray-100 transition-all dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 rounded-lg p-2.5">
        <a href="https://www.oncedemanolo.com/" target="_blank" class="font-tourney"> 11M</a>
      </button>
      <!-- dark/light mode btn -->
      <button id="theme-toggle" class="text-gray-500 dark:text-gray-400 hover:bg-gray-100 transition-all dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 rounded-lg text-sm p-2.5">

    <!-- dark svg icon -->
    <svg
    id="theme-toggle-dark-icon"
    class="w-5 h-5 hidden"
    fill="currentColor"
    viewBox="0 0 20 20"
    xmlns="http://www.w3.org/2000/svg"
  >
    <path
      d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
    ></path>
  </svg>
   
  <!-- light svg icon -->
  <svg
    id="theme-toggle-light-icon"
    class="w-5 h-5 hidden"
    fill="currentColor"
    viewBox="0 0 20 20"
    xmlns="http://www.w3.org/2000/svg"
  >
    <path
      d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
      fill-rule="evenodd"
      clip-rule="evenodd"
    ></path>
  </svg>
      </button>
    </div>
  </header>

  <!-- HERO -->
<section class="container max-w-screen-xl mx-auto px-4 py-10">
  <div class="text-center">
    <!-- Title -->
    <div class="max-w-3xl mx-auto flex flex-col">
      <h1 class="mt-1 bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 bg-clip-text text-5xl md:text-8xl font-tourney uppercase tracking-tight text-transparent">Los jugadores</h1>
      <h2 class="order-first bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 bg-clip-text font-bold text-transparent uppercase">El 11 de Manolo</h2>
    </div>
    <!-- Text -->
    <p class="mx-auto mt-8 max-w-2xl text-lg">Conoce y encuentra a los más de <span class="font-semibold bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 bg-clip-text text-transparent inline-block uppercase">2000 jugadores</span> que han sido parte de al menos uno de los equipos del 11 de Manolo.</p>
    
<!-- Search -->
<div class="max-w-4xl mx-auto px-4 mt-8 mb-6">
  <input
    type="text"
    id="searchInput"
    class="w-full border-b-2 border-gray-300 h-12 p-4 bg-transparent focus:outline-none"
    placeholder="Buscar jugador"
    autocomplete="off"
  />
</div>

<!-- RESULTS -->
<div class="px-4 text-sm mb-2">
  <span id="results_summary"></span>
</div>
<div id="no_results" class="px-4 text-xs hidden">No se encontraron jugadores.</div>
</div>
</section>

<!-- PLAYER -->
<section class="container mx-auto px-4 pb-16">
<!-- Grid -->
<div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 mx-auto gap-4" id="players_grid"></div>   

<!-- Load more -->
<div class="w-full flex justify-center pt-20">
  <button id="loadMore"
    class="hidden rounded-full px-5 py-3 bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 hover:opacity-50 transition-all font-bold uppercase text-sm text-white">
    Cargar más
  </button>
</div>
</section>

    <!-- footer -->
    <section class="w-full mx-auto bg-black text-center py-4 space-y-0 font-sans">
  <span class="font-bold tracking-widest uppercase hover:opacity-80 transition-all duration-200 bg-gradient-to-r from-yellow-100 via-yellow-300 to-yellow-500 bg-clip-text text-transparent"> <a href="https://pab-ns.github.io/hello/" target="_blank">Pablo Neyra</a></span>
  <p class="text-xxs bg-gradient-to-r from-yellow-100 via-yellow-300 to-yellow-500 bg-clip-text font-bold text-transparent">© <span id="date"></span></p>
      <script>
    window.onload = function () {
      var date = new Date();
      document.getElementById("date").innerHTML = date.getFullYear();
    };
  </script>   
    </section>


<!-- PapaParse -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<!-- App -->
<script src="players.js"></script>


</body>
</html>
